                options: {
                    A: "設置保護區有助於維護自然原始生態",
                    B: "外來物種可能會對本地生態造成衝擊",
                    C: "面對環境的變遷，生命自會找到出路",
                    D: "破壞生物間的互利關係恐有連鎖反應"
                },
                answer: "A",
                reference: "第一冊"
            }
        ];

        // 動態生成 HTML 試題卡片
        function renderQuiz() {
            const container = document.getElementById('questions-container');
            container.innerHTML = '';
            let currentGroup = "";

            questionDataset.forEach((q, index) => {
                // 如果是題組，且遇到了新的題組背景，就渲染背景說明區
                if (q.type === 'reading' && q.group !== currentGroup) {
                    currentGroup = q.group;
                    const contextDiv = document.createElement('div');
                    contextDiv.className = 'bg-slate-100 border-l-4 border-slate-600 p-5 rounded-r-xl my-4 text-sm text-slate-700 leading-relaxed';
                    contextDiv.innerHTML = q.readingContext;
                    container.appendChild(contextDiv);
                }

                // 生成單題卡片
                const card = document.createElement('div');
                card.id = `block-${q.id}`;
                card.className = 'question-card bg-white p-6 rounded-2xl shadow-sm border border-slate-200 transition-all duration-300';
                
                // 題目敘述
                let cardHTML = `
                    <div class="flex items-start gap-3 mb-4">
                        <span class="bg-slate-800 text-white text-xs font-black px-2 py-1 rounded">Q${index + 1}</span>
                        <div class="flex-1">
                            <p class="font-bold text-slate-800 text-base leading-relaxed">${q.text}</p>
                            <span class="reference-tag inline-block text-xs bg-slate-100 text-slate-600 px-2 py-0.5 rounded-full mt-2">
                                對應教材：${q.reference}
                            </span>
                        </div>
                    </div>
                    <div class="space-y-3">
                `;

                // 渲染 A, B, C, D 選項大觸控按鈕
                for (let key in q.options) {
                    cardHTML += `
                        <label class="option-label block cursor-pointer p-4 rounded-xl border border-slate-200 hover:bg-slate-50 transition active:scale-[0.99] touch-feedback">
                            <input type="radio" name="${q.id}" value="${key}" class="mr-3 transform scale-125 accent-blue-600">
                            <span class="text-slate-700 font-medium">${key === 'A' ? '(A)' : key === 'B' ? '(B)' : key === 'C' ? '(C)' : '(D)'} ${q.options[key]}</span>
                        </label>
                    `;
                }

                cardHTML += `
                    </div>
                    <div class="error-message text-red-600 font-bold mt-4 pt-3 border-t border-dashed border-red-200 text-sm">
                        ❌ 答錯了！請再想想看。
                    </div>
                `;

                card.innerHTML = cardHTML;
                container.appendChild(card);
            });
        }

        // 取得本機歷史紀錄
        function getHistory() {
            const data = localStorage.getItem('quiz_history_v115');
            return data ? JSON.parse(data) : [];
        }

        // 渲染歷史成績
        function renderHistory() {
            const history = getHistory();
            const box = document.getElementById('history-list-box');
            box.innerHTML = '';

            if (history.length === 0) {
                box.innerHTML = '<li class="text-center text-slate-400 py-4">尚未有任何作答紀錄。</li>';
                return;
            }

            history.forEach(item => {
                const li = document.createElement('li');
                li.className = 'border-b border-slate-100 py-2 flex justify-between items-center';
                li.innerHTML = `
                    <span>📋 第 <strong>${item.attempt}</strong> 次作答 (${item.time})</span>
                    <span class="font-bold text-slate-700">得分：<strong class="text-blue-600">${item.score}</strong> / ${item.total} 題 (${item.rate})</span>
                `;
                box.appendChild(li);
            });
        }

        // 送出對答與批改
        function checkAnswers() {
            let correctCount = 0;
            const totalCount = questionDataset.length;

            questionDataset.forEach(q => {
                const card = document.getElementById(`block-${q.id}`);
                const selected = document.querySelector(`input[name="${q.id}"]:checked`);

                card.classList.remove('error', 'correct', 'bg-red-50/20', 'bg-emerald-50/20', 'border-red-200', 'border-emerald-200');

                if (!selected) {
                    // 未作答直接算錯
                    card.classList.add('error', 'bg-red-50/20', 'border-red-200');
                } else if (selected.value === q.answer) {
                    card.classList.add('correct', 'bg-emerald-50/20', 'border-emerald-200');
                    correctCount++;
                } else {
                    card.classList.add('error', 'bg-red-50/20', 'border-red-200');
                }
            });

            const percentage = Math.round((correctCount / totalCount) * 100) + '%';
            
            // 寫入 localStorage 紀錄
            const history = getHistory();
            const attemptNum = history.length + 1;
            const now = new Date();
            const timeStr = `${now.getMonth() + 1}/${now.getDate()} ${now.getHours().toString().padStart(2, '0')}:${now.getMinutes().toString().padStart(2, '0')}`;

            history.push({
                attempt: attemptNum,
                score: correctCount,
                total: totalCount,
                rate: percentage,
                time: timeStr
            });
            localStorage.setItem('quiz_history_v115', JSON.stringify(history));

            // 更新歷史與成績看板
            renderHistory();
            document.getElementById('board-attempt-num').innerText = attemptNum;
            document.getElementById('board-correct-count').innerText = correctCount;
            document.getElementById('board-total-count').innerText = totalCount;
            document.getElementById('board-percentage').innerText = percentage;
            document.getElementById('score-board').style.display = 'block';

            // 展開控制按鈕
            document.getElementById('explanation-btn').classList.remove('hidden');
            document.getElementById('reset-btn').classList.remove('hidden');

            // 滾動回 Q1 位置進行檢查
            document.getElementById('block-q1').scrollIntoView({ behavior: 'smooth' });
        }

        // 自製 iPad 專屬彈窗管理
        let currentAction = null;

        function openConfirmModal(action) {
            currentAction = action;
            const modal = document.getElementById('custom-modal');
            const title = document.getElementById('modal-title');
            const msg = document.getElementById('modal-message');
            const confirmBtn = document.getElementById('modal-confirm-btn');

            if (action === 'clearHistory') {
                title.innerText = '清除歷史紀錄';
                msg.innerText = '您確定要清除所有的歷史作答成績嗎？此動作將無法復原！';
                confirmBtn.className = 'flex-1 bg-red-600 hover:bg-red-700 text-white font-semibold py-2.5 rounded-xl text-sm transition';
            } else if (action === 'resetQuiz') {
                title.innerText = '重新作答確認';
                msg.innerText = '確定要清除目前所有勾選答案並重新作答嗎？（歷史紀錄仍會保留）';
                confirmBtn.className = 'flex-1 bg-blue-600 hover:bg-blue-700 text-white font-semibold py-2.5 rounded-xl text-sm transition';
            }

            modal.classList.remove('hidden');
            modal.classList.add('flex');

            confirmBtn.onclick = () => {
                closeConfirmModal(true);
            };
        }

        function closeConfirmModal(confirmed) {
            const modal = document.getElementById('custom-modal');
            modal.classList.remove('flex');
            modal.classList.add('hidden');

            if (confirmed && currentAction === 'clearHistory') {
                localStorage.removeItem('quiz_history_v115');
                renderHistory();
            } else if (confirmed && currentAction === 'resetQuiz') {
                // 清空勾選
                document.getElementById('quizForm').reset();
                
                // 還原所有卡片顏色與提示
                questionDataset.forEach(q => {
                    const card = document.getElementById(`block-${q.id}`);
                    card.classList.remove('error', 'correct', 'bg-red-50/20', 'bg-emerald-50/20', 'border-red-200', 'border-emerald-200');
                });

                // 隱藏批改看板與按鈕
                document.getElementById('score-board').style.display = 'none';
                document.getElementById('explanation-btn').classList.add('hidden');
                document.getElementById('reset-btn').classList.add('hidden');

                // 滾回頂部
                window.scrollTo({ top: 0, behavior: 'smooth' });
            }
            currentAction = null;
        }

        // 初始化渲染
        renderQuiz();
    </script>
</body>
</html>
