<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <!-- 防快取設定 -->
    <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
    <meta http-equiv="Pragma" content="no-cache">
    <meta http-equiv="Expires" content="0">
    <title>第一、二冊國文科能力測驗 - iPad 優化版</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&family=Noto+Sans+TC:wght@400;500;700&display=swap" rel="stylesheet">
    <style>
        body {
            font-family: 'Noto Sans TC', sans-serif;
            -webkit-tap-highlight-color: transparent;
        }
        /* 加大選取框點擊感 */
        .option-label {
            transition: all 0.2s ease;
            user-select: none;
        }
        .option-label:active {
            transform: scale(0.98);
        }
        input[type="radio"]:checked + div {
            background-color: #dbeafe;
            border-color: #3b82f6;
        }
        /* 滾動條美化 */
        ::-webkit-scrollbar {
            width: 6px;
        }
        ::-webkit-scrollbar-thumb {
            background: #cbd5e1;
            border-radius: 10px;
        }
        /* 答錯/答對樣式 */
        .question-correct { border-left: 8px solid #22c55e !important; }
        .question-wrong { border-left: 8px solid #ef4444 !important; }
    </style>
</head>
<body class="bg-slate-50 text-slate-800 pb-24">

<div class="max-w-3xl mx-auto px-4 py-8">
    <header class="text-center mb-8">
        <h1 class="text-3xl font-bold text-slate-900 mb-2">國文科模擬測驗</h1>
        <p class="text-slate-500">適用範圍：第一冊至第二冊內容</p>
    </header>

    <!-- 歷史紀錄板 -->
    <section id="historySection" class="bg-white rounded-2xl shadow-sm border border-slate-200 p-6 mb-8 hidden">
        <div class="flex justify-between items-center mb-4">
            <h2 class="text-lg font-bold flex items-center">
                <span class="mr-2">📊</span> 歷史作答紀錄
            </h2>
            <button onclick="clearHistory()" class="text-xs text-red-500 hover:underline">清除紀錄</button>
        </div>
        <div id="historyList" class="space-y-2 max-h-40 overflow-y-auto pr-2">
            <!-- 歷史資料動態注入 -->
        </div>
    </section>

    <!-- 測驗內容區 -->
    <form id="quizForm" class="space-y-6">
        
        <!-- Q1 -->
        <div class="question-card bg-white p-6 rounded-2xl shadow-sm border border-slate-200" id="q1-card">
            <div class="flex items-start gap-3 mb-4">
                <span class="bg-slate-900 text-white text-xs font-bold px-2 py-1 rounded">Q1</span>
                <p class="font-medium text-lg">下列文句中的「即」字，何者為「靠近」之意？</p>
            </div>
            <div class="space-y-3">
                <label class="option-label block cursor-pointer">
                    <input type="radio" name="q1" value="A" class="hidden">
                    <div class="p-4 border-2 border-slate-100 rounded-xl hover:border-blue-200">(A) 被熱水燙傷之後，應該立「即」用大量冷水沖洗</div>
                </label>
                <label class="option-label block cursor-pointer">
                    <input type="radio" name="q1" value="B" class="hidden">
                    <div class="p-4 border-2 border-slate-100 rounded-xl hover:border-blue-200">(B) 他們兩個人的關係若「即」若離，真令人難以捉摸</div>
                </label>
                <label class="option-label block cursor-pointer">
                    <input type="radio" name="q1" value="C" class="hidden">
                    <div class="p-4 border-2 border-slate-100 rounded-xl hover:border-blue-200">(C) 本活動摸彩中獎者，憑票根「即」可至服務臺領取獎品</div>
                </label>
                <label class="option-label block cursor-pointer">
                    <input type="radio" name="q1" value="D" class="hidden">
                    <div class="p-4 border-2 border-slate-100 rounded-xl hover:border-blue-200">(D) 我不是你的傭人，別以為我可以招之「即」來，揮之即去</div>
                </label>
            </div>
            <p class="result-msg mt-3 hidden text-sm font-bold"></p>
        </div>

        <!-- Q16 (範例呈現，實際應補齊所有題目) -->
        <div class="question-card bg-white p-6 rounded-2xl shadow-sm border border-slate-200" id="q16-card">
            <div class="flex items-start gap-3 mb-4">
                <span class="bg-slate-900 text-white text-xs font-bold px-2 py-1 rounded">Q16</span>
                <p class="font-medium text-lg">依據本文引述的研究發現（如 image_39322b.png 所示內容），無法說明下列何者？</p>
            </div>
            <div class="space-y-3">
                <label class="option-label block cursor-pointer">
                    <input type="radio" name="q16" value="A" class="hidden">
                    <div class="p-4 border-2 border-slate-100 rounded-xl hover:border-blue-200">(A) 設置保護區有助於維護自然原始生態</div>
                </label>
                <label class="option-label block cursor-pointer">
                    <input type="radio" name="q16" value="B" class="hidden">
                    <div class="p-4 border-2 border-slate-100 rounded-xl hover:border-blue-200">(B) 外來物種可能會對本地生態造成衝擊</div>
                </label>
                <label class="option-label block cursor-pointer">
                    <input type="radio" name="q16" value="C" class="hidden">
                    <div class="p-4 border-2 border-slate-100 rounded-xl hover:border-blue-200">(C) 面對環境的變遷，生命自會找到出路</div>
                </label>
                <label class="option-label block cursor-pointer">
                    <input type="radio" name="q16" value="D" class="hidden">
                    <div class="p-4 border-2 border-slate-100 rounded-xl hover:border-blue-200">(D) 破壞生物間的互利關係恐有連鎖反應</div>
                </label>
            </div>
            <p class="result-msg mt-3 hidden text-sm font-bold"></p>
        </div>

    </form>

    <div class="mt-10 space-y-4">
        <button id="submitBtn" onclick="gradeQuiz()" class="w-full bg-blue-600 text-white py-5 rounded-2xl text-xl font-bold shadow-lg shadow-blue-200 active:bg-blue-700 transition-all">
            送出對答
        </button>
        <div id="afterAction" class="hidden grid grid-cols-2 gap-4">
            <button onclick="resetQuiz()" class="bg-slate-200 text-slate-700 py-4 rounded-2xl font-bold hover:bg-slate-300">
                重新作答
            </button>
            <a href="115會考國文解析.pdf" target="_blank" class="bg-green-600 text-white py-4 rounded-2xl font-bold text-center hover:bg-green-700">
                查看 PDF 解析
            </a>
        </div>
    </div>
</div>

<!-- 分數浮動視窗 (僅在對完答案顯示) -->
<div id="scoreModal" class="fixed bottom-6 right-6 left-6 md:left-auto md:w-80 bg-slate-900 text-white p-6 rounded-3xl shadow-2xl transform translate-y-32 transition-transform duration-500 z-50">
    <div class="flex justify-between items-center mb-2">
        <span class="text-slate-400 text-sm">本次測驗結果</span>
        <button onclick="closeModal()" class="text-slate-400">✕</button>
    </div>
    <div class="text-3xl font-bold mb-1">答對 <span id="correctScore">0</span> 題</div>
    <div class="text-slate-400 text-sm mb-4">共 16 題 (答對率 <span id="correctRate">0</span>%)</div>
    <div class="h-2 w-full bg-slate-700 rounded-full overflow-hidden">
        <div id="scoreBar" class="h-full bg-blue-500 transition-all duration-1000" style="width: 0%"></div>
    </div>
</div>

<script>
    // 正確答案設定
    const answers = {
        q1: 'B',
        // ... 其他題目答案
        q16: 'A'
    };

    // 初始載入
    window.onload = function() {
        loadHistory();
        // 如果是從快取回復，確保按鈕狀態正確
        document.getElementById('quizForm').reset();
    };

    function gradeQuiz() {
        let correctCount = 0;
        let total = Object.keys(answers).length;
        let unanswered = false;

        // 檢查並評分
        Object.keys(answers).forEach(qId => {
            const card = document.getElementById(`${qId}-card`);
            const selected = document.querySelector(`input[name="${qId}"]:checked`);
            const msg = card.querySelector('.result-msg');
            
            msg.classList.remove('hidden');
            card.classList.remove('question-correct', 'question-wrong');

            if (!selected) {
                unanswered = true;
                card.classList.add('question-wrong');
                msg.innerText = "❌ 未作答";
                msg.className = "result-msg mt-3 text-red-500 font-bold";
            } else if (selected.value === answers[qId]) {
                correctCount++;
                card.classList.add('question-correct');
                msg.innerText = "✅ 回答正確";
                msg.className = "result-msg mt-3 text-green-600 font-bold";
            } else {
                card.classList.add('question-wrong');
                msg.innerText = `❌ 回答錯誤 (正確答案是 ${answers[qId]})`;
                msg.className = "result-msg mt-3 text-red-500 font-bold";
            }
        });

        // 顯示分數
        const rate = Math.round((correctCount / total) * 100);
        document.getElementById('correctScore').innerText = correctCount;
        document.getElementById('correctRate').innerText = rate;
        document.getElementById('scoreBar').style.width = rate + '%';
        document.getElementById('scoreModal').classList.remove('translate-y-32');

        // 儲存紀錄
        saveHistory(correctCount, total, rate);

        // 按鈕切換
        document.getElementById('submitBtn').classList.add('hidden');
        document.getElementById('afterAction').classList.remove('hidden');
        
        // 自動捲動到最上方看分數看板
        window.scrollTo({ top: 0, behavior: 'smooth' });
    }

    function resetQuiz() {
        if (!confirm('確定要重新作答嗎？目前的作答與評分將被清除。')) return;
        
        document.getElementById('quizForm').reset();
        document.querySelectorAll('.result-msg').forEach(m => m.classList.add('hidden'));
        document.querySelectorAll('.question-card').forEach(c => c.classList.remove('question-correct', 'question-wrong'));
        
        document.getElementById('submitBtn').classList.remove('hidden');
        document.getElementById('afterAction').classList.add('hidden');
        document.getElementById('scoreModal').classList.add('translate-y-32');
    }

    function saveHistory(correct, total, rate) {
        const history = JSON.parse(localStorage.getItem('quizHistory') || '[]');
        const entry = {
            date: new Date().toLocaleString('zh-TW', { month: 'numeric', day: 'numeric', hour: '2-digit', minute: '2-digit' }),
            score: `${correct}/${total}`,
            rate: rate + '%'
        };
        history.unshift(entry); // 最新的放前面
        localStorage.setItem('quizHistory', JSON.stringify(history.slice(0, 10))); // 只存最近10筆
        loadHistory();
    }

    function loadHistory() {
        const history = JSON.parse(localStorage.getItem('quizHistory') || '[]');
        const list = document.getElementById('historyList');
        const section = document.getElementById('historySection');

        if (history.length === 0) {
            section.classList.add('hidden');
            return;
        }

        section.classList.remove('hidden');
        list.innerHTML = history.map(item => `
            <div class="flex justify-between items-center text-sm p-3 bg-slate-50 rounded-lg">
                <span class="text-slate-500 font-medium">${item.date}</span>
                <span class="font-bold text-slate-700">答對 ${item.score} <span class="text-blue-500 ml-2">(${item.rate})</span></span>
            </div>
        `).join('');
    }

    function clearHistory() {
        if (confirm('確定要永久清除所有歷史紀錄嗎？')) {
            localStorage.removeItem('quizHistory');
            loadHistory();
        }
    }

    function closeModal() {
        document.getElementById('scoreModal').classList.add('translate-y-32');
    }
</script>
</body>
</html>
